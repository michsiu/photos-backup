name: Photo Upload via Ngrok

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flask pillow piexif

      - name: Install ngrok
        run: |
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.zip
          unzip -o ngrok-v3-stable-linux-amd64.zip

          chmod +x ngrok

          ./ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      - name: Configure git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Start upload server
        run: |
          python upload_server.py > server.log 2>&1 &

      - name: Start ngrok
        run: |
          ./ngrok http 5000 > ngrok.log 2>&1 &

      - name: Wait and print URL
        run: |
          echo "Waiting for ngrok..."

          URL=""

          for i in {1..60}; do

            URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.ngrok-free\.app' ngrok.log | head -n 1)

            if [ ! -z "$URL" ]; then
              break
            fi

            sleep 1
          done

          echo ""
          echo "========== NGROK LOG =========="
          cat ngrok.log || true
          echo "================================"

          if [ -z "$URL" ]; then
            echo "Failed to get ngrok URL"
            exit 1
          fi

          echo ""
          echo "===================================="
          echo "UPLOAD SERVER READY"
          echo ""
          echo "$URL"
          echo ""
          echo "===================================="

      - name: Keep workflow alive
        run: |
          tail -f /dev/null