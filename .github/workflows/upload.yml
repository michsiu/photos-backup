name: Photo Upload via Ngrok

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flask pillow piexif

      - name: Install ngrok
        run: |
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.zip
          unzip -o ngrok-v3-stable-linux-amd64.zip
          chmod +x ngrok
          ./ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      - name: Start Flask
        run: |
          nohup python upload_server.py > server.log 2>&1 &
          echo $! > flask.pid
          sleep 2

      - name: Start ngrok
        run: |
          nohup ./ngrok http 5000 > ngrok.log 2>&1 &
          echo $! > ngrok.pid

      - name: Wait for ngrok and print URL
        run: |
          URL=""
          for i in {1..60}; do
            URL=$(curl -s http://127.0.0.1:4040/api/tunnels \
              | grep -oE 'https://[a-zA-Z0-9.-]+' | head -n 1)
            if [ ! -z "$URL" ]; then
              echo "=============================================="
              echo "  Upload page available at: $URL"
              echo "  Open this URL in your browser to upload."
              echo "=============================================="
              break
            fi
            sleep 2
          done
          if [ -z "$URL" ]; then
            echo "Failed to obtain ngrok URL. Last ngrok log:"
            tail -20 ngrok.log
            exit 1
          fi

      - name: Keep alive until shutdown
        run: |
          echo "Waiting for Flask server to exit..."
          wait $(cat flask.pid)

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add photos/ thumbs/ photos.json
          git commit -m "Upload new photos via ngrok" || echo "No changes to commit"
          git push