name: Photo Upload via Ngrok

on:
  workflow_dispatch:  # 手动触发

jobs:
  upload:
    runs-on: ubuntu-latest
    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_REF: ${{ github.ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install flask pillow piexif

      - name: Download and setup ngrok
        run: |
          wget -q -O ngrok.zip https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-linux-amd64.zip
          unzip -o ngrok.zip
          chmod +x ngrok
          ./ngrok authtoken $NGROK_AUTH_TOKEN

      - name: Start upload server and ngrok
        run: |
          # 启动 Flask 服务器（后台运行）
          python upload_server.py &
          sleep 2
          
          # 启动 ngrok，暴露 5000 端口
          ./ngrok http 5000 --log=stdout > ngrok.log 2>&1 &
          
          # 等待 ngrok API 就绪（最多等30秒）
          for i in {1..30}; do
            if curl -s http://127.0.0.1:4040/api/tunnels > /dev/null 2>&1; then
              break
            fi
            echo "Waiting for ngrok to start..."
            sleep 1
          done
          
          # 从 ngrok 本地 API 获取公网 URL
          NGROK_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | python -c "import sys,json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])")
          echo "=============================================="
          echo "  Upload page available at: $NGROK_URL"
          echo "  Open this URL in your browser to upload."
          echo "=============================================="
          
          # 等待服务器进程结束（由用户通过 /shutdown 触发）
          wait

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add photos/ thumbs/ photos.json
          git commit -m "Upload new photos via ngrok" || echo "No changes to commit"
          git push