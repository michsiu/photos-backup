name: Photo Upload via Ngrok

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flask pillow piexif

      - name: Install ngrok
        run: |
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.zip
          unzip -o ngrok-v3-stable-linux-amd64.zip
          chmod +x ngrok
          ./ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      - name: Start server, ngrok, and wait for shutdown
        run: |
          # 1. 启动 Flask (后台，记录PID.)
          nohup python upload_server.py > server.log 2>&1 &
          echo $! > flask.pid
          sleep 2

          # 2. 启动 ngrok
          nohup ./ngrok http 5000 > ngrok.log 2>&1 &
          echo $! > ngrok.pid

          # 3. 等待 ngrok 隧道就绪并打印URL
          URL=""
          for i in {1..60}; do
            URL=$(curl -s http://127.0.0.1:4040/api/tunnels \
              | grep -oE 'https://[a-zA-Z0-9.-]+' | head -n 1)
            if [ -n "$URL" ]; then
              echo "=============================================="
              echo "  Upload page available at: $URL"
              echo "  Open this URL in your browser to upload."
              echo "=============================================="
              break
            fi
            sleep 2
          done
          if [ -z "$URL" ]; then
            echo "Failed to get ngrok URL. Ngrok log:"
            tail -20 ngrok.log
            exit 1
          fi

          # 4. 循环等待 Flask 进程退出（用户点 Stop 后 os._exit 会结束它）
          FLASK_PID=$(cat flask.pid)
          echo "Flask PID: $FLASK_PID - waiting for shutdown..."
          while kill -0 $FLASK_PID 2>/dev/null; do
            sleep 5
          done
          echo "Flask server has stopped."

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add photos/ thumbs/ photos.json
          git commit -m "Upload new photos via ngrok" || echo "No changes to commit"
          git push