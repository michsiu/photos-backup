name: Photo Upload via Ngrok

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flask pillow piexif

      - name: Download and setup ngrok
        run: |
          wget -q -O ngrok.zip https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-linux-amd64.zip
          unzip -o ngrok.zip
          chmod +x ngrok

          ./ngrok authtoken "$NGROK_AUTH_TOKEN"

      - name: Configure git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Start upload server + ngrok
        run: |
          python upload_server.py > server.log 2>&1 &

          sleep 2

          ./ngrok http 5000 --log=stdout > ngrok.log 2>&1 &

          echo "Waiting for ngrok tunnel..."

          NGROK_URL=""

          for i in {1..60}; do
            if curl -s http://127.0.0.1:4040/api/tunnels > /tmp/ngrok.json 2>/dev/null; then

              NGROK_URL=$(python3 - <<'PY'
import json

try:
    with open("/tmp/ngrok.json") as f:
        data = json.load(f)

    tunnels = data.get("tunnels", [])

    for t in tunnels:
        url = t.get("public_url", "")
        if url.startswith("https://"):
            print(url)
            break

except:
    pass
PY
)

              if [ ! -z "$NGROK_URL" ]; then
                break
              fi
            fi

            echo "Attempt $i/60..."

            if [ $i -eq 10 ]; then
              echo "========== NGROK LOG =========="
              tail -20 ngrok.log || true
              echo "================================"
            fi

            sleep 1
          done

          if [ -z "$NGROK_URL" ]; then
            echo "Failed to get ngrok URL"

            echo "========== NGROK LOG =========="
            cat ngrok.log || true

            echo "========== SERVER LOG =========="
            cat server.log || true

            exit 1
          fi

          echo ""
          echo "=============================================="
          echo " Photo Upload Server Running"
          echo ""
          echo " Upload URL:"
          echo " $NGROK_URL"
          echo ""
          echo "=============================================="
          echo ""

          echo "Keeping workflow alive..."
          tail -f /dev/null