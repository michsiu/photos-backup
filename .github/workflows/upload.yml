name: Photo Upload via Ngrok

on:
  workflow_dispatch:  # 手动触发

jobs:
  upload:
    runs-on: ubuntu-latest
    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_REF: ${{ github.ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install flask pillow piexif

      - name: Download and setup ngrok
        run: |
          wget -q -O ngrok.zip https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-linux-amd64.zip
          unzip -o ngrok.zip
          chmod +x ngrok
          ./ngrok authtoken $NGROK_AUTH_TOKEN

      - name: Start upload server and ngrok
        run: |
          # 启动 Flask 服务器（后台运行）
          python upload_server.py &
          sleep 2
          
          # 启动 ngrok，暴露 5000 端口
          ./ngrok http 5000 --log=stdout > ngrok.log 2>&1 &
          
          # 等待 ngrok API 就绪并获取 URL（最多等60秒）
          NGROK_URL=""
          for i in {1..60}; do
            # 检查 API 是否可访问
            if curl -s http://127.0.0.1:4040/api/tunnels > /tmp/ngrok_response 2>&1; then
              # 尝试解析 URL
              NGROK_URL=$(python -c "
import json
with open('/tmp/ngrok_response') as f:
    data = json.load(f)
tunnels = data.get('tunnels', [])
if tunnels:
    print(tunnels[0].get('public_url', ''))
" 2>/dev/null)
              if [ ! -z "$NGROK_URL" ]; then
                break
              fi
            fi
            echo "Waiting for ngrok tunnel... (attempt $i/60)"
            # 打印 ngrok 日志帮助排查（可选）
            if [ $i -eq 10 ]; then
              echo "--- ngrok log (last 5 lines) ---"
              tail -5 ngrok.log || true
              echo "--- end ---"
            fi
            sleep 1
          done
          
          if [ -z "$NGROK_URL" ]; then
            echo "Failed to get ngrok URL"
            cat ngrok.log
            exit 1
          fi
          
          echo "=============================================="
          echo "  Upload page available at: $NGROK_URL"
          echo "  Open this URL in your browser to upload."
          echo "=============================================="
          
          # 等待服务器进程结束（由用户通过 /shutdown 触发）
          wait

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add photos/ thumbs/ photos.json
          git commit -m "Upload new photos via ngrok" || echo "No changes to commit"
          git push