name: Photo Upload via Ngrok

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install flask pillow piexif

      - name: Install ngrok
        run: |
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.zip
          unzip -o ngrok-v3-stable-linux-amd64.zip
          chmod +x ngrok
          ./ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      # =========================
      # START SERVER
      # =========================
      - name: Start Flask
        run: |
          nohup python upload_server.py > server.log 2>&1 &
          echo $! > flask.pid

      - name: Start ngrok
        run: |
          nohup ./ngrok http 5000 > ngrok.log 2>&1 &
          echo $! > ngrok.pid

      # =========================
      # WAIT NGROK URL
      # =========================
      - name: Wait ngrok
        run: |
          for i in {1..60}; do
            URL=$(curl -s http://127.0.0.1:4040/api/tunnels \
              | grep -oE 'https://[a-zA-Z0-9.-]+' | head -n 1)

            if [ ! -z "$URL" ]; then
              break
            fi

            echo "waiting..."
            sleep 2
          done

          echo "UPLOAD URL: $URL"

      # =========================
      # SAVE ARTIFACTS (CLEAN WAY)
      # =========================
      - name: Upload logs (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: runtime-logs
          path: |
            server.log
            ngrok.log
            flask.pid
            ngrok.pid

      # =========================
      # ONLY SAVE REAL DATA TO REPO
      # =========================
      - name: Commit photos only
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add photos.json photos thumbs || true
          git commit -m "auto update photos" || true

          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git || true