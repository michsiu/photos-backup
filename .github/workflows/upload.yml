name: Photo Upload via Ngrok

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flask pillow piexif

      - name: Install ngrok
        run: |
          wget -q https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-linux-amd64.zip
          unzip -o ngrok-stable-linux-amd64.zip

          chmod +x ngrok

          ./ngrok authtoken "$NGROK_AUTH_TOKEN"

      - name: Configure git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Start upload server
        run: |
          python upload_server.py > server.log 2>&1 &

      - name: Start ngrok
        run: |
          ./ngrok http 5000 > ngrok.log 2>&1 &

      - name: Get ngrok url
        run: |
          echo "Waiting for ngrok..."

          for i in {1..60}; do

            URL=$(curl -s http://127.0.0.1:4040/api/tunnels | grep -o 'https://[^"]*' | head -n 1)

            if [ ! -z "$URL" ]; then
              echo ""
              echo "=================================="
              echo "UPLOAD URL:"
              echo "$URL"
              echo "=================================="
              echo ""
              break
            fi

            sleep 1
          done

      - name: Keep alive
        run: |
          tail -f /dev/null