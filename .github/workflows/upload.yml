name: Photo Upload via Ngrok

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install flask pillow

      - name: Install ngrok
        run: |
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.zip
          unzip -o ngrok-v3-stable-linux-amd64.zip
          chmod +x ngrok
          ./ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      - name: Start Flask
        run: |
          nohup python upload_server.py > server.log 2>&1 &
          echo $! > flask.pid

      - name: Start ngrok
        run: |
          nohup ./ngrok http 5000 > ngrok.log 2>&1 &
          echo $! > ngrok.pid

      - name: Wait ngrok
        run: |
          for i in {1..60}; do
            URL=$(curl -s http://127.0.0.1:4040/api/tunnels \
              | grep -oE 'https://[a-zA-Z0-9.-]+' | head -n 1)

            if [ ! -z "$URL" ]; then
              echo "URL: $URL"
              break
            fi
            sleep 2
          done

      # 🔥 关键：阻塞 workflow，不让它结束
      - name: Keep alive (IMPORTANT)
        run: |
          echo "Server running..."
          while true; do
            sleep 60
          done