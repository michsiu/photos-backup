name: Photo Upload via Ngrok

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flask pillow piexif

      - name: Install ngrok
        run: |
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.zip
          unzip -o ngrok-v3-stable-linux-amd64.zip

          chmod +x ngrok

          ./ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      - name: Configure git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Start Flask server
        run: |
          nohup python upload_server.py > server.log 2>&1 &

      - name: Start ngrok
        run: |
          nohup ./ngrok http 5000 > ngrok.log 2>&1 &

      - name: Wait for ngrok
        run: |
          echo "Waiting for ngrok API..."

          URL=""

          for i in {1..90}; do

            RESPONSE=$(curl -s http://127.0.0.1:4040/api/tunnels || true)

            URL=$(echo "$RESPONSE" | grep -oE 'https://[a-zA-Z0-9.-]+\.ngrok-free\.app' | head -n 1)

            if [ ! -z "$URL" ]; then
              break
            fi

            echo "Attempt $i/90"

            sleep 2
          done

          echo ""
          echo "================ NGROK RESPONSE ================"
          echo "$RESPONSE"
          echo "================================================"
          echo ""

          if [ -z "$URL" ]; then
            echo "ERROR: Failed to detect ngrok URL"

            echo ""
            echo "================ NGROK LOG ================"
            cat ngrok.log || true
            echo "==========================================="
            echo ""

            exit 1
          fi

          echo ""
          echo "============================================"
          echo " PHOTO UPLOAD SERVER READY"
          echo ""
          echo " Upload URL:"
          echo " $URL"
          echo ""
          echo "============================================"

      - name: Keep workflow alive
        run: |
          echo "Keeping workflow alive..."
          tail -f /dev/null