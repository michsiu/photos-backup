name: Photo Upload via Ngrok

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    env:
      NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install flask pillow piexif

      - name: Install ngrok
        run: |
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.zip
          unzip -o ngrok-v3-stable-linux-amd64.zip
          chmod +x ngrok
          ./ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      # =========================
      # START SERVER (PID SAFE)
      # =========================
      - name: Start Flask
        run: |
          nohup python upload_server.py > server.log 2>&1 &
          echo $! > flask.pid

      - name: Start ngrok
        run: |
          nohup ./ngrok http 5000 > ngrok.log 2>&1 &
          echo $! > ngrok.pid

      # =========================
      # WAIT URL
      # =========================
      - name: Wait ngrok URL
        run: |
          for i in {1..60}; do
            URL=$(curl -s http://127.0.0.1:4040/api/tunnels | grep -oE 'https://[a-zA-Z0-9.-]+' | head -n 1)

            if [ ! -z "$URL" ]; then
              break
            fi

            echo "waiting..."
            sleep 2
          done

          echo "UPLOAD URL: $URL"

      # =========================
      # AUTO COMMIT (FIXED)
      # =========================
      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add photos.json photos thumbs server.log ngrok.log || true
          git commit -m "auto update" || true

          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git || true

      # =========================
      # CLEAN EXIT (NO tail freeze)
      # =========================
      - name: Wait for shutdown
        run: |
          while [ ! -f STOP ]; do
            sleep 2
          done